<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Ambient color blobs -->
  <circle cx="120" cy="100" r="160" fill="#6366f1" opacity="0.06" filter="softglow"/>
  <circle cx="540" cy="300" r="140" fill="#38bdf8" opacity="0.05" filter="softglow"/>
  <circle cx="330" cy="350" r="120" fill="#818cf8" opacity="0.04" filter="softglow"/>
  <circle cx="580" cy="80" r="100" fill="#f97316" opacity="0.04" filter="softglow"/>

  <!-- Floating orbs -->
  <circle cx="80" cy="60" r="12" fill="#f97316" opacity="0.5" filter="glow"/>
  <circle cx="580" cy="50" r="10" fill="#6366f1" opacity="0.45" filter="glow"/>
  <circle cx="60" cy="340" r="8" fill="#22c55e" opacity="0.4" filter="glow"/>
  <circle cx="600" cy="350" r="14" fill="#38bdf8" opacity="0.4" filter="glow"/>
  <circle cx="330" cy="30" r="6" fill="#f59e0b" opacity="0.35"/>
  <circle cx="200" cy="370" r="5" fill="#818cf8" opacity="0.3"/>
  <circle cx="480" cy="380" r="7" fill="#22c55e" opacity="0.3"/>

  <!-- Arrow pointing from app to Applications -->
  <path d="M 280 248 L 370 248" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6 4" fill="none"/>
  <polygon points="374,248 366,243 366,253" fill="rgba(255,255,255,0.15)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="658" height="398" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
</svg>
