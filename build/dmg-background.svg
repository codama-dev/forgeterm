<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#141425"/>
      <stop offset="100%" stop-color="#0c0c1a"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow-center" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-left" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Subtle ambient glows -->
  <ellipse cx="180" cy="170" rx="200" ry="180" fill="url(#glow-left)"/>
  <ellipse cx="480" cy="170" rx="200" ry="180" fill="url(#glow-right)"/>
  <ellipse cx="330" cy="200" rx="240" ry="200" fill="url(#glow-center)"/>

  <!-- Floating orbs - small, tasteful -->
  <circle cx="70" cy="50" r="5" fill="#f97316" opacity="0.5"/>
  <circle cx="590" cy="40" r="4" fill="#6366f1" opacity="0.45"/>
  <circle cx="50" cy="350" r="3.5" fill="#22c55e" opacity="0.4"/>
  <circle cx="610" cy="360" r="5" fill="#38bdf8" opacity="0.35"/>
  <circle cx="330" cy="25" r="3" fill="#f59e0b" opacity="0.35"/>
  <circle cx="145" cy="375" r="2.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="520" cy="375" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="95" cy="200" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="565" cy="195" r="3.5" fill="#f97316" opacity="0.3"/>

  <!-- Arrow from app icon to Applications -->
  <line x1="248" y1="170" x2="400" y2="170" stroke="url(#arrow-grad)" stroke-width="1.5" stroke-dasharray="8 5" stroke-linecap="round"/>
  <polygon points="406,170 396,164 396,176" fill="#818cf8" opacity="0.7"/>

  <!-- "Drag to install" text -->
  <text x="330" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="0.5">
    drag to install
  </text>

  <!-- Subtle grid dots -->
  <g fill="rgba(255,255,255,0.025)">
    <circle cx="30" cy="130" r="1"/><circle cx="30" cy="170" r="1"/><circle cx="30" cy="210" r="1"/>
    <circle cx="630" cy="130" r="1"/><circle cx="630" cy="170" r="1"/><circle cx="630" cy="210" r="1"/>
  </g>

  <!-- Bottom subtle line -->
  <line x1="130" y1="380" x2="530" y2="380" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
</svg>
